<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="robots" content="noindex, nofollow">
<meta name="google-site-verification" content="W20Oi3NAQC8VtVNNA8WKWZtx5HaaQmIe5-7kPaA_l_c" />
<title>Running Companion</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-180.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#ff5a1f">
<script src="marked.min.js"></script>
<style>
  :root { color-scheme: light dark; }
  body { font-family: -apple-system, "Hiragino Sans", sans-serif; margin: 0 auto; max-width: 720px;
         padding: calc(env(safe-area-inset-top) + 8px) 16px calc(env(safe-area-inset-bottom) + 16px); }
  header { display: flex; gap: 6px; align-items: center; padding: 8px 0; flex-wrap: wrap; }
  button { font-size: 16px; padding: 8px 12px; border-radius: 8px; border: 1px solid #8884; background: transparent; }
  #run { background: #ff5a1f; color: #fff; border: none; font-weight: 600; }
  #run:disabled { opacity: .5; }
  #date { font-size: 16px; padding: 6px; border-radius: 8px; border: 1px solid #8884; background: transparent; flex: 1; min-width: 130px; }
  #status { font-size: 14px; opacity: .8; min-height: 1.4em; padding: 4px 0; }
  #tabs { display: flex; gap: 4px; margin: 4px 0 8px; }
  #tabs button { flex: 1; font-size: 15px; padding: 6px 0; border: 1px solid #8884; background: transparent; opacity: .6; }
  #tabs button[aria-pressed="true"] { opacity: 1; font-weight: 600; border-color: #ff5a1f; color: #ff5a1f; }
  #content { line-height: 1.75; word-break: break-word; }
  #content table { border-collapse: collapse; display: block; overflow-x: auto; }
  #content th, #content td { border: 1px solid #8886; padding: 4px 8px; white-space: nowrap; }
  #content code { background: #8882; padding: 1px 4px; border-radius: 4px; }
  dialog { border: 1px solid #8886; border-radius: 12px; width: min(90vw, 420px); }
  dialog::backdrop { background: #0006; }
  input { width: 100%; font-size: 16px; padding: 8px; box-sizing: border-box; }
  .row { display: flex; gap: 8px; justify-content: flex-end; margin-top: 12px; }
</style>
</head>
<body>
<header>
  <button id="prev" aria-label="前日">◀</button>
  <input type="date" id="date">
  <button id="next" aria-label="翌日">▶</button>
  <button id="run">実行</button>
  <button id="settings" aria-label="設定">⚙︎</button>
</header>
<div id="tabs">
  <button id="tab-strava" aria-pressed="true">Strava</button>
  <button id="tab-garmin" aria-pressed="false">Garmin</button>
</div>
<div id="status"></div>
<article id="content"></article>

<dialog id="dlg">
  <h3>設定</h3>
  <p style="font-size:14px">GitHub Personal Access Token(fine-grained / 対象: n-iroha/Running / 権限: Contents Read + Actions Read and write)</p>
  <input id="pat" type="password" placeholder="github_pat_..." autocomplete="off">
  <div class="row">
    <button id="patClear">削除</button>
    <button id="patSave">保存</button>
  </div>
</dialog>

<script>
// ===== 定数・ユーティリティ =====
const REPO = 'n-iroha/Running';          // 評価ファイルとワークフローを置いている GitHub リポジトリ
const WORKFLOW = 'run-eval.yml';         // 「実行」ボタンで起動する GitHub Actions ワークフロー
const API = 'https://api.github.com';    // GitHub REST API のベースURL
// 評価ソースごとの格納ディレクトリ。ファイル名は両ソースとも eval_YYYY-MM-DD.md で共通
const EVAL_DIRS = { strava: 'daily_evaluations', garmin: 'garmin_evaluations' };
let source = 'strava';                    // 現在の評価ソース。起動時は常に Strava(永続化しない)
const evalDir = () => EVAL_DIRS[source];  // 現在のソースに対応する評価ディレクトリを返す
const $ = (id) => document.getElementById(id);                  // 要素取得の短縮形
const pat = () => localStorage.getItem('gh_pat') || '';         // 保存済みの GitHub Personal Access Token を返す
const sleep = (ms) => new Promise((r) => setTimeout(r, ms));    // 指定ミリ秒待つ(ポーリング用)

// GitHub API を呼ぶ共通ラッパー。PAT の Authorization ヘッダーを自動で付ける
function gh(path, opts = {}) {
  return fetch(API + path, {
    ...opts,
    headers: {
      'Authorization': 'Bearer ' + pat(),
      'X-GitHub-Api-Version': '2022-11-28',
      ...(opts.headers || {}),
    },
  });
}

// 日本時間(UTC+9)での今日の日付を 'YYYY-MM-DD' 形式で返す
function jstToday() { return new Date(Date.now() + 9 * 3600 * 1000).toISOString().slice(0, 10); }
// 'YYYY-MM-DD' 形式の日付に n 日を加算して同じ形式で返す(n が負なら過去日)
function addDays(iso, n) {
  const d = new Date(iso + 'T00:00:00Z');
  d.setUTCDate(d.getUTCDate() + n);
  return d.toISOString().slice(0, 10);
}

// ===== 評価の表示 =====
// 指定日(iso = 'YYYY-MM-DD')の評価 Markdown をリポジトリから取得して画面に描画する
async function showDate(iso) {
  $('date').value = iso;
  $('content').innerHTML = '';
  $('status').textContent = '読み込み中…';
  let res;
  try {
    // Contents API から eval_YYYY-MM-DD.md を生の Markdown テキストとして取得
    res = await gh(`/repos/${REPO}/contents/${evalDir()}/eval_${iso}.md`,
      { headers: { 'Accept': 'application/vnd.github.raw+json' } });
  } catch {
    // fetch 自体の失敗 = ネットワーク未接続
    $('status').textContent = 'オフラインです';
    return;
  }
  if (res.status === 404) {
    // ファイルが存在しない = その日の評価が未生成。ソースごとに案内を変える
    $('status').textContent = '';
    $('content').innerHTML = source === 'garmin'
      ? '<p>この日の Garmin版評価はありません。Mac で <code>garmin_eval.py</code> を実行して生成してください。</p>'
      : '<p>この日の評価はありません。昨日の分が未生成であれば「実行」で routine を起動できます。</p>';
    return;
  }
  if (res.status === 401 || res.status === 403) {
    // 認証エラー = PAT が無効・期限切れなので設定ダイアログを開く
    $('status').textContent = 'トークンを確認してください';
    $('dlg').showModal();
    return;
  }
  if (!res.ok) { $('status').textContent = `エラー: HTTP ${res.status}`; return; }
  // Markdown を HTML に変換して表示(marked.min.js を使用)
  const md = await res.text();
  $('status').textContent = '';
  $('content').innerHTML = marked.parse(md);
  window.scrollTo(0, 0);
}

// 起動時に呼ばれる。評価ディレクトリの一覧から最新日付の評価を探して表示する
async function showLatest() {
  try {
    const res = await gh(`/repos/${REPO}/contents/${evalDir()}`);
    if (res.status === 401 || res.status === 403) {
      $('status').textContent = 'トークンを確認してください';
      $('dlg').showModal();
      return;
    }
    if (res.ok) {
      // ファイル名 eval_YYYY-MM-DD.md から日付部分を抜き出し、昇順ソートして最新を選ぶ
      const items = await res.json();
      const dates = items
        .map((i) => (i.name.match(/^eval_(\d{4}-\d{2}-\d{2})\.md$/) || [])[1])
        .filter(Boolean)
        .sort();
      if (dates.length) return showDate(dates[dates.length - 1]);
    }
  } catch {
    $('status').textContent = 'オフラインです';
    return;
  }
  // 一覧が取れない・評価ファイルが1つもない場合は昨日の日付で表示を試みる
  showDate(addDays(jstToday(), -1));
}

// ===== routine の実行 =====
// 「実行」ボタンの処理。GitHub Actions のワークフローを起動し、
// (1) ワークフローの完了 → (2) 評価ファイルの生成 の2段階をポーリングで見届ける
async function runRoutine() {
  if (!pat()) { $('dlg').showModal(); return; }   // PAT 未設定なら先に設定ダイアログを開く
  // 日付ピッカーで選択中の日付を評価対象にする(未選択なら JST の今日)
  const target = $('date').value || jstToday();
  $('run').disabled = true;                       // 二重起動を防ぐためボタンを無効化
  $('status').textContent = '実行リクエスト送信中…';
  const dispatchedAt = new Date().toISOString();  // この時刻以降に作られた run だけを自分の起動とみなす
  let res;
  try {
    // workflow_dispatch イベントでワークフローを起動(main ブランチ上で実行)
    // 選択中の日付を inputs.date として渡し、その日の評価を生成させる
    res = await gh(`/repos/${REPO}/actions/workflows/${WORKFLOW}/dispatches`, {
      method: 'POST',
      body: JSON.stringify({ ref: 'main', inputs: { date: target } }),
    });
  } catch {
    $('status').textContent = 'オフラインです';
    $('run').disabled = false;
    return;
  }
  // dispatch API は成功すると 204 No Content を返す。それ以外は起動失敗
  if (res.status !== 204) {
    $('status').textContent = `起動失敗: HTTP ${res.status}`;
    $('run').disabled = false;
    return;
  }
  // --- 第1段階: ワークフロー run の完了を待つ(10秒間隔 × 最大30回 = 最大5分) ---
  $('status').textContent = '起動中…';
  let fired = false;
  for (let i = 0; i < 30; i++) {
    await sleep(10000);
    const runsRes = await gh(`/repos/${REPO}/actions/workflows/${WORKFLOW}/runs?per_page=1`).catch(() => null);
    if (!runsRes || !runsRes.ok) continue;
    const run = (await runsRes.json()).workflow_runs?.[0];
    // dispatch 以前の古い run は無視(まだ自分の run が一覧に現れていない)
    if (!run || run.created_at < dispatchedAt) continue;
    if (run.status === 'completed') {
      if (run.conclusion === 'success') { fired = true; }
      else { $('status').textContent = `起動失敗: ${run.conclusion}(GitHub Actionsを確認)`; }
      break;
    }
    $('status').textContent = `起動中…(${run.status})`;
  }
  if (!fired) { $('run').disabled = false; if (!$('status').textContent.includes('失敗')) $('status').textContent = '起動確認タイムアウト'; return; }
  // --- 第2段階: 対象日の評価ファイルがコミットされるのを待つ(30秒間隔 × 最大30回 = 最大15分) ---
  // target は dispatch 時に渡した選択日。同じ日の eval が生成されるのを待つ
  $('status').textContent = `routine実行中… eval_${target}.md の生成を待っています(画面を開いたままにしてください)`;
  for (let i = 0; i < 30; i++) {
    await sleep(30000);
    // routine(実行ボタン)は現状 Strava 専用なので、参照先は Strava 固定
    const check = await gh(`/repos/${REPO}/contents/${EVAL_DIRS.strava}/eval_${target}.md`).catch(() => null);
    if (check && check.ok) {
      // ファイルが見つかったら表示して終了
      $('status').textContent = '';
      $('run').disabled = false;
      return showDate(target);
    }
  }
  $('status').textContent = '15分待ちましたが評価が見つかりません。しばらく後に日付を選び直してください。';
  $('run').disabled = false;
}

// 「実行」ボタンの有効/無効をソースに応じて切替える(Task 4 で本実装)
function updateRunButton() {}

// ===== イベントハンドラー =====
$('prev').onclick = () => showDate(addDays($('date').value || jstToday(), -1));  // ◀: 前日へ
$('next').onclick = () => showDate(addDays($('date').value || jstToday(), 1));   // ▶: 翌日へ
$('date').onchange = () => $('date').value && showDate($('date').value);         // 日付ピッカーで直接選択
$('run').onclick = runRoutine;                                                   // 実行: routine を起動
// ソース切替。選択中の日付を維持したまま、新ソースの同じ日付の評価を再取得する
function setSource(next) {
  if (source === next) return;
  source = next;
  $('tab-strava').setAttribute('aria-pressed', String(source === 'strava'));
  $('tab-garmin').setAttribute('aria-pressed', String(source === 'garmin'));
  updateRunButton();
  showDate($('date').value || jstToday());
}
$('tab-strava').onclick = () => setSource('strava');
$('tab-garmin').onclick = () => setSource('garmin');
$('settings').onclick = () => { $('pat').value = pat(); $('dlg').showModal(); }; // ⚙︎: 設定ダイアログを開く
// 保存: 入力された PAT を localStorage に保存して再起動
$('patSave').onclick = () => {
  localStorage.setItem('gh_pat', $('pat').value.trim());
  $('dlg').close();
  boot();
};
// 削除: 保存済みの PAT を消去
$('patClear').onclick = () => { localStorage.removeItem('gh_pat'); $('pat').value = ''; };

// ===== 起動処理 =====
// PAT があれば最新の評価を表示、なければ設定ダイアログを開く
function boot() {
  if (!pat()) { $('dlg').showModal(); return; }
  showLatest();
}
// PWA としてオフラインキャッシュを使うための Service Worker を登録
if ('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js');
boot();
</script>
</body>
</html>
